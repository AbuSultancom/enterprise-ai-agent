<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enterprise AI Agent — المساعد الذكي</title>
<style>
  /* === Reset & Base === */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0f172a; --bg2: #1e293b; --bg3: #334155; --bg4: #475569;
    --fg: #e2e8f0; --fg2: #94a3b8; --fg3: #64748b;
    --accent: #38bdf8; --accent2: #2563eb; --accent3: #1d4ed8;
    --user-msg: #2563eb; --agent-msg: #1e293b;
    --border: #334155; --border2: #475569;
    --danger: #ef4444; --success: #22c55e;
    --radius: 12px; --radius-sm: 8px;
    --sidebar-w: 300px; --header-h: 52px;
    --font: 'Segoe UI', 'Tahoma', system-ui, -apple-system, sans-serif;
  }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: var(--font); background: var(--bg); color: var(--fg);
    display: flex; flex-direction: column;
  }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--bg4); }

  /* === Layout === */
  #app { display: flex; height: 100vh; width: 100vw; }

  /* === Sidebar === */
  #sidebar {
    width: var(--sidebar-w); min-width: var(--sidebar-w);
    background: var(--bg2); border-left: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden;
    transition: transform .25s ease;
  }
  html[dir="rtl"] #sidebar { border-left: none; border-right: 1px solid var(--border); }
  #sidebar.hidden { transform: translateX(100%); }
  html[dir="rtl"] #sidebar.hidden { transform: translateX(-100%); }

  .sidebar-header {
    padding: 12px 14px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
  }
  .sidebar-header h2 { font-size: 14px; font-weight: 600; flex: 1; }
  .sidebar-header h2 span { color: var(--accent); }

  .btn { 
    background: var(--bg3); border: none; color: var(--fg); 
    padding: 6px 12px; border-radius: var(--radius-sm); cursor: pointer;
    font-size: 12px; font-family: inherit; white-space: nowrap;
    transition: background .15s; display: inline-flex; align-items: center; gap: 4px;
  }
  .btn:hover { background: var(--bg4); }
  .btn-primary { background: var(--accent2); color: #fff; }
  .btn-primary:hover { background: var(--accent3); }
  .btn-sm { padding: 4px 8px; font-size: 11px; }
  .btn-icon { padding: 4px; width: 28px; height: 28px; justify-content: center; border-radius: 6px; font-size: 14px; }

  .sidebar-section { padding: 8px 14px; border-bottom: 1px solid var(--border); }
  .sidebar-section-title {
    font-size: 11px; font-weight: 600; color: var(--fg3); text-transform: uppercase;
    letter-spacing: .5px; margin-bottom: 8px;
  }

  /* Model & Toggle row */
  #model-select { 
    width: 100%; background: var(--bg); border: 1px solid var(--border); 
    color: var(--fg); padding: 6px 10px; border-radius: var(--radius-sm); 
    font-size: 12px; font-family: inherit; cursor: pointer;
    outline: none; 
  }
  #model-select:focus { border-color: var(--accent); }
  #model-select option { background: var(--bg2); color: var(--fg); }

  /* Conversation list */
  #conv-list { flex: 1; overflow-y: auto; padding: 6px 0; }
  .conv-item {
    padding: 10px 14px; cursor: pointer; border-bottom: 1px solid transparent;
    transition: background .15s; display: flex; align-items: center; gap: 8px;
  }
  .conv-item:hover { background: var(--bg); }
  .conv-item.active { background: var(--bg); border-bottom-color: var(--accent); }
  .conv-item .conv-title { flex: 1; font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .conv-item .conv-date { font-size: 10px; color: var(--fg3); white-space: nowrap; }
  .conv-item .conv-del { 
    opacity: 0; background: none; border: none; color: var(--danger); 
    cursor: pointer; font-size: 14px; padding: 0 2px; line-height: 1;
    transition: opacity .15s;
  }
  .conv-item:hover .conv-del { opacity: .6; }
  .conv-item .conv-del:hover { opacity: 1; }
  .conv-empty { padding: 20px; text-align: center; color: var(--fg3); font-size: 13px; }

  /* Knowledge / Accounting status */
  #kb-list { max-height: 120px; overflow-y: auto; }
  .kb-item { font-size: 12px; color: var(--fg2); padding: 3px 0; display: flex; align-items: center; gap: 6px; }
  .kb-item::before { content: '📄'; font-size: 11px; }
  .kb-empty { font-size: 12px; color: var(--fg3); padding: 4px 0; }

  #acct-status { font-size: 12px; padding: 4px 0; }
  .status-ok { color: var(--success); }
  .status-err { color: var(--danger); }

  /* === Main Panel === */
  #main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

  /* Header */
  #header {
    height: var(--header-h); min-height: var(--header-h);
    padding: 0 16px; background: var(--bg2); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
  }
  #header h1 { font-size: 15px; font-weight: 600; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #header h1 span { color: var(--accent); }
  #header-actions { display: flex; align-items: center; gap: 6px; }
  #lang-btn { min-width: 40px; }
  #status-badge { font-size: 10px; color: var(--fg3); padding: 2px 6px; background: var(--bg); border-radius: 4px; display: none; }

  /* Chat area */
  #chat {
    flex: 1; overflow-y: auto; padding: 20px;
    display: flex; flex-direction: column; gap: 10px;
  }
  #chat:empty::after {
    content: attr(data-empty);
    display: block; text-align: center; color: var(--fg3); font-size: 14px;
    margin: auto; max-width: 400px; line-height: 1.7;
    padding: 40px 20px;
  }

  .msg {
    max-width: 80%; padding: 10px 14px; border-radius: 14px;
    line-height: 1.65; white-space: pre-wrap; font-size: 14px;
    word-wrap: break-word; position: relative;
  }
  .msg.user {
    align-self: flex-end; background: var(--user-msg);
    border-bottom-right-radius: 4px;
  }
  html[dir="rtl"] .msg.user { border-bottom-right-radius: 14px; border-bottom-left-radius: 4px; }
  .msg.agent {
    align-self: flex-start; background: var(--agent-msg); border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }
  .msg.sys {
    align-self: center; background: transparent; color: var(--fg3);
    font-size: 12px; padding: 4px 10px; max-width: 90%;
  }
  .msg.error { align-self: center; color: var(--danger); font-size: 13px; text-align: center; }
  .msg .steps {
    margin-top: 8px; font-size: 12px; color: var(--fg2); 
    border-top: 1px solid var(--border); padding-top: 6px;
  }
  .msg .steps code { color: var(--accent); font-size: 11px; }
  .msg .cursor {
    display: inline-block; width: 7px; height: 14px;
    background: var(--accent); animation: blink .8s infinite;
    vertical-align: middle; margin: 0 1px;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* Typing indicator */
  .typing {
    align-self: flex-start; display: flex; gap: 4px;
    padding: 10px 14px; background: var(--agent-msg); border: 1px solid var(--border);
    border-radius: 14px; border-bottom-left-radius: 4px;
  }
  .typing span {
    width: 8px; height: 8px; background: var(--bg4); border-radius: 50%;
    animation: typing-bounce 1.4s infinite ease-in-out both;
  }
  .typing span:nth-child(1) { animation-delay: 0s; }
  .typing span:nth-child(2) { animation-delay: .2s; }
  .typing span:nth-child(3) { animation-delay: .4s; }
  @keyframes typing-bounce {
    0%, 60%, 100% { transform: translateY(0); background: var(--bg4); }
    30% { transform: translateY(-6px); background: var(--accent); }
  }

  /* Input bar */
  #input-bar {
    padding: 12px 16px; background: var(--bg2); border-top: 1px solid var(--border);
    display: flex; gap: 8px; align-items: center;
  }
  #input {
    flex: 1; background: var(--bg); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 14px; color: var(--fg);
    font-size: 14px; outline: none; font-family: inherit;
    resize: none; min-height: 20px; max-height: 120px; line-height: 1.4;
  }
  #input:focus { border-color: var(--accent); }
  #input::placeholder { color: var(--fg3); }
  #send-btn { 
    background: var(--accent2); border: none; color: #fff; 
    width: 38px; height: 38px; border-radius: 10px; cursor: pointer;
    font-size: 16px; display: flex; align-items: center; justify-content: center;
    transition: background .15s; flex-shrink: 0;
  }
  #send-btn:hover { background: var(--accent3); }
  #send-btn:disabled { opacity: .4; cursor: not-allowed; }
  #attach-btn {
    background: none; border: none; color: var(--fg2); cursor: pointer;
    font-size: 18px; padding: 6px; border-radius: 8px;
    transition: background .15s, color .15s;
    flex-shrink: 0; display: flex; align-items: center;
  }
  #attach-btn:hover { background: var(--bg3); color: var(--fg); }
  #file-input { display: none; }

  /* Mobile sidebar toggle */
  #sidebar-toggle {
    display: none; background: none; border: none; color: var(--fg);
    font-size: 20px; cursor: pointer; padding: 4px;
  }

  /* === Responsive === */
  @media (max-width: 768px) {
    #sidebar { 
      position: fixed; top: 0; left: 0; height: 100vh; z-index: 100;
      transform: translateX(100%); box-shadow: 0 0 30px rgba(0,0,0,.5);
    }
    html[dir="rtl"] #sidebar { left: auto; right: 0; transform: translateX(-100%); }
    #sidebar.open { transform: translateX(0); }
    #sidebar-toggle { display: block; }
    #sidebar-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5);
      z-index: 99;
    }
    #sidebar-overlay.show { display: block; }
    .msg { max-width: 90%; }
  }

  /* Toast notifications */
  .toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
    background: var(--bg2); border: 1px solid var(--border); color: var(--fg);
    padding: 10px 20px; border-radius: var(--radius); font-size: 13px;
    z-index: 200; box-shadow: 0 4px 20px rgba(0,0,0,.4);
    animation: toast-in .3s ease, toast-out .3s ease 2.7s forwards;
  }
  @keyframes toast-in { from { opacity: 0; transform: translateX(-50%) translateY(10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
  @keyframes toast-out { from { opacity: 1; } to { opacity: 0; transform: translateX(-50%) translateY(-10px); } }
</style>
</head>
<body>

<div id="sidebar-overlay" onclick="closeSidebar()"></div>

<div id="app">
  <!-- === Sidebar === -->
  <aside id="sidebar">
    <div class="sidebar-header">
      <h2><span>AI</span> Agent</h2>
      <button class="btn btn-primary btn-sm" id="new-chat-btn" onclick="newConversation()">+</button>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-section-title" data-i18n="model">Model</div>
      <select id="model-select" onchange="onModelChange()">
        <option value="">Default</option>
        <option value="openai:gpt-4o">GPT-4o</option>
        <option value="openai:gpt-4o-mini">GPT-4o Mini</option>
        <option value="openai:deepseek-chat">DeepSeek</option>
        <option value="ollama:llama3.2-vision:11b">Llama 3.2 Vision</option>
        <option value="ollama:qwen2.5:7b">Qwen 2.5</option>
      </select>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-section-title" data-i18n="conversations">Conversations</div>
    </div>
    <div id="conv-list">
      <div class="conv-empty" data-i18n="loading">جاري التحميل...</div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-section-title" data-i18n="knowledge_base">Knowledge Base</div>
      <div id="kb-list"><div class="kb-empty" data-i18n="loading">...</div></div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-section-title" data-i18n="accounting">Accounting</div>
      <div id="acct-status"><span class="status-err" data-i18n="not_configured">غير مهيأ</span></div>
    </div>
  </aside>

  <!-- === Main Chat Area === -->
  <div id="main">
    <header id="header">
      <button id="sidebar-toggle" onclick="toggleSidebar()">☰</button>
      <h1>Enterprise <span id="session-title" data-i18n="ai_agent">AI Agent</span></h1>
      <div id="header-actions">
        <span id="status-badge"></span>
        <button class="btn btn-sm" id="upload-btn" onclick="document.getElementById('file-input').click()">
          📎
        </button>
        <button class="btn btn-sm" id="lang-btn" onclick="toggleLang()">EN</button>
      </div>
    </header>

    <input type="file" id="file-input" accept=".txt,.md,.csv,.json,.pdf,.docx,.png,.jpg,.jpeg,.gif,.webp" onchange="uploadFile(this)">

    <div id="chat" data-empty=""></div>

    <div id="input-bar">
      <button id="attach-btn" onclick="document.getElementById('file-input').click()" title="Attach file or image">📎</button>
      <textarea id="input" rows="1" oninput="autoResize(this)"></textarea>
      <button id="send-btn" onclick="send()" disabled>➤</button>
    </div>
  </div>
</div>

<script>
/* ===== I18N ===== */
const I18N = {
  ar: {
    model: 'النموذج',
    conversations: 'المحادثات',
    knowledge_base: 'قاعدة المعرفة',
    accounting: 'المحاسبة',
    not_configured: 'غير مهيأ',
    connected: 'متصل',
    loading: 'جاري التحميل...',
    empty_convs: 'لا توجد محادثات سابقة',
    empty_chat: 'اكتب سؤالك لبدء المحادثة مع المساعد الذكي\nيمكنك رفع صور وفواتير ومستندات',
    new_conv: 'محادثة جديدة',
    send: 'إرسال',
    send_btn: '➤',
    placeholder: 'اسأل الوكيل أي شيء...',
    thinking: 'يفكر',
    tool_used: 'استخدم الأداة',
    uploading: 'جارٍ رفع الملف...',
    uploaded: (f, n) => `تم رفع "${f}" (${n} جزء) إلى قاعدة المعرفة ✓`,
    upload_fail: 'فشل رفع الملف: ',
    error: 'خطأ: ',
    key_prompt: 'أدخل مفتاح API:',
    key_invalid: 'المفتاح المحفوظ لم يعد صالحًا. أدخل المفتاح الجديد.',
    dir: 'rtl', lang_btn: 'EN',
    ai_agent: 'AI Agent',
    image_analysis: 'تحليل الصورة',
    kb_docs: 'مستندات',
    no_docs: 'لا توجد مستندات',
    delete: 'حذف',
    deleted_conv: 'تم حذف المحادثة',
    no_acct: 'غير مهيأ',
    acct_ok: '✓ متصل',
    acct_err: '✗ غير متصل',
  },
  en: {
    model: 'Model',
    conversations: 'Conversations',
    knowledge_base: 'Knowledge Base',
    accounting: 'Accounting',
    not_configured: 'Not configured',
    connected: 'Connected',
    loading: 'Loading...',
    empty_convs: 'No past conversations',
    empty_chat: 'Ask the agent anything to start a conversation\nYou can upload images, invoices, and documents',
    new_conv: 'New conversation',
    send: 'Send',
    send_btn: '➤',
    placeholder: 'Ask the agent anything...',
    thinking: 'Thinking',
    tool_used: 'Used tool',
    uploading: 'Uploading file...',
    uploaded: (f, n) => `Uploaded "${f}" (${n} chunk(s)) to the knowledge base ✓`,
    upload_fail: 'Upload failed: ',
    error: 'Error: ',
    key_prompt: 'Enter your API key:',
    key_invalid: 'The saved key is no longer valid. Enter the new key.',
    dir: 'ltr', lang_btn: 'عربي',
    ai_agent: 'AI Agent',
    image_analysis: 'Image Analysis',
    kb_docs: 'Documents',
    no_docs: 'No documents',
    delete: 'Delete',
    deleted_conv: 'Conversation deleted',
    no_acct: 'Not configured',
    acct_ok: '✓ Connected',
    acct_err: '✗ Disconnected',
  }
};

/* ===== State ===== */
let lang = localStorage.getItem('lang') || 'ar';
let API_KEY = localStorage.getItem('api_key');
if (!API_KEY) {
  API_KEY = prompt(I18N[lang].key_prompt) || '';
  localStorage.setItem('api_key', API_KEY);
}
let currentSessionId = null;
let currentAbort = null;
let isStreaming = false;

/* ===== DOM refs ===== */
const chat = document.getElementById('chat');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send-btn');
const convList = document.getElementById('conv-list');
const kbList = document.getElementById('kb-list');
const acctStatus = document.getElementById('acct-status');
const modelSelect = document.getElementById('model-select');
const sessionTitle = document.getElementById('session-title');
const statusBadge = document.getElementById('status-badge');

/* ===== Lang ===== */
function applyLang() {
  const t = I18N[lang];
  document.documentElement.lang = lang;
  document.documentElement.dir = t.dir;
  document.getElementById('lang-btn').textContent = t.lang_btn;
  input.placeholder = t.placeholder;
  chat.setAttribute('data-empty', t.empty_chat);
  // Apply i18n to static elements
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (t[key]) el.textContent = t[key];
  });
}
function toggleLang() {
  lang = lang === 'ar' ? 'en' : 'ar';
  localStorage.setItem('lang', lang);
  applyLang();
  // Re-translate dynamic content
  loadConversations();
  loadKnowledgeBase();
  loadAccountingStatus();
}
applyLang();

/* ===== Helpers ===== */
function t(key, ...args) {
  const val = I18N[lang][key];
  return typeof val === 'function' ? val(...args) : (val || key);
}

function toast(msg) {
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  sendBtn.disabled = !el.value.trim();
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('show');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('show');
}
function onModelChange() {
  localStorage.setItem('preferred_model', modelSelect.value);
}

/* ===== Message rendering ===== */
function addMsg(text, cls) {
  const div = document.createElement('div');
  div.className = 'msg ' + cls;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function addMsgHTML(html, cls) {
  const div = document.createElement('div');
  div.className = 'msg ' + cls;
  div.innerHTML = html;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'typing';
  div.id = 'typing-indicator';
  div.innerHTML = '<span></span><span></span><span></span>';
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function hideTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

/* ===== API calls ===== */
async function api(path, opts = {}) {
  const headers = { 'X-API-Key': API_KEY, ...opts.headers };
  if (opts.body && !(opts.body instanceof FormData)) {
    headers['Content-Type'] = 'application/json';
  }
  const r = await fetch(path, { ...opts, headers });
  if (r.status === 401 || r.status === 403) {
    localStorage.removeItem('api_key');
    const fresh = prompt(t('key_invalid')) || '';
    if (fresh) {
      localStorage.setItem('api_key', fresh);
      API_KEY = fresh;
      return api(path, opts);
    }
    throw new Error('Authentication failed');
  }
  return r;
}

/* ===== Conversation list ===== */
async function loadConversations() {
  try {
    const r = await api('/v1/conversations');
    const data = await r.json();
    renderConversations(data);
  } catch (e) {
    convList.innerHTML = `<div class="conv-empty">${t('error')}${e.message}</div>`;
  }
}

function renderConversations(sessions) {
  if (!sessions || sessions.length === 0) {
    convList.innerHTML = `<div class="conv-empty">${t('empty_convs')}</div>`;
    return;
  }
  convList.innerHTML = '';
  sessions.forEach(s => {
    const div = document.createElement('div');
    div.className = 'conv-item' + (s.id === currentSessionId ? ' active' : '');
    div.dataset.id = s.id;

    const title = document.createElement('span');
    title.className = 'conv-title';
    title.textContent = s.title || 'Conversation';

    const date = document.createElement('span');
    date.className = 'conv-date';
    try {
      date.textContent = new Date(s.updated).toLocaleDateString(lang === 'ar' ? 'ar-SA' : 'en-US', { month: 'short', day: 'numeric' });
    } catch { date.textContent = ''; }

    const del = document.createElement('button');
    del.className = 'conv-del';
    del.textContent = '✕';
    del.title = t('delete');
    del.onclick = async (e) => {
      e.stopPropagation();
      await deleteConversation(s.id);
    };

    div.appendChild(title);
    div.appendChild(date);
    div.appendChild(del);
    div.onclick = () => loadConversation(s.id);
    convList.appendChild(div);
  });
}

async function loadConversation(sessionId) {
  if (isStreaming && currentAbort) {
    currentAbort.abort();
  }
  closeSidebar();
  try {
    const r = await api('/v1/conversations/' + sessionId);
    const data = await r.json();
    currentSessionId = data.session_id;
    sessionTitle.textContent = data.title || 'Conversation';
    renderMessages(data.messages || []);
    // Update active state in sidebar
    document.querySelectorAll('.conv-item').forEach(el => {
      el.classList.toggle('active', el.dataset.id === currentSessionId);
    });
  } catch (e) {
    chat.innerHTML = `<div class="msg error">${t('error')}${e.message}</div>`;
  }
}

async function deleteConversation(sessionId) {
  try {
    const r = await api('/v1/conversations/' + sessionId, { method: 'DELETE' });
    if (r.ok) {
      toast(t('deleted_conv'));
      if (currentSessionId === sessionId) {
        newConversation();
      } else {
        loadConversations();
      }
    }
  } catch (e) {
    toast(t('error') + e.message);
  }
}

function newConversation() {
  if (isStreaming && currentAbort) {
    currentAbort.abort();
  }
  currentSessionId = null;
  sessionTitle.textContent = t('ai_agent');
  chat.innerHTML = '';
  chat.setAttribute('data-empty', t('empty_chat'));
  input.value = '';
  sendBtn.disabled = true;
  input.focus();
  document.querySelectorAll('.conv-item').forEach(el => el.classList.remove('active'));
  closeSidebar();
}

function renderMessages(messages) {
  chat.innerHTML = '';
  chat.removeAttribute('data-empty');
  messages.forEach(m => {
    if (m.role === 'user') addMsg(m.content, 'user');
    else if (m.role === 'assistant') addMsg(m.content, 'agent');
    else if (m.role === 'system') addMsg(m.content, 'sys');
  });
  chat.scrollTop = chat.scrollHeight;
}

/* ===== Knowledge Base ===== */
async function loadKnowledgeBase() {
  try {
    const r = await api('/v1/knowledge');
    const data = await r.json();
    if (!data || data.length === 0) {
      kbList.innerHTML = `<div class="kb-empty">${t('no_docs')}</div>`;
      return;
    }
    kbList.innerHTML = '';
    data.slice(0, 10).forEach(doc => {
      const div = document.createElement('div');
      div.className = 'kb-item';
      div.textContent = doc.title + (doc.has_embedding ? '' : ' ⏳');
      kbList.appendChild(div);
    });
  } catch {
    kbList.innerHTML = `<div class="kb-empty">${t('error')}</div>`;
  }
}

/* ===== Accounting Status ===== */
async function loadAccountingStatus() {
  try {
    const r = await api('/v1/accounting/health');
    const data = await r.json();
    if (data.connection) {
      acctStatus.innerHTML = `<span class="status-ok">${t('acct_ok')}</span>`;
    } else {
      acctStatus.innerHTML = `<span class="status-err">${t('acct_err')}</span>`;
    }
  } catch {
    acctStatus.innerHTML = `<span class="status-err">${t('no_acct')}</span>`;
  }
}

/* ===== Health check ===== */
async function loadStatus() {
  try {
    const r = await fetch('/health');
    const d = await r.json();
    const parts = [];
    if (d.providers) {
      for (const [k, v] of Object.entries(d.providers)) {
        parts.push(k + (v ? ' ✓' : ' ✗'));
      }
    }
    if (d.tools !== undefined) parts.push(`tools: ${d.tools}`);
    statusBadge.textContent = parts.join(' · ');
    statusBadge.style.display = 'block';
  } catch {
    statusBadge.style.display = 'none';
  }
}

/* ===== File Upload ===== */
async function uploadFile(el) {
  const file = el.files[0];
  if (!file) return;

  const isImage = file.type.startsWith('image/');
  if (isImage) {
    // Send image directly to the agent for analysis
    const reader = new FileReader();
    reader.onload = async (e) => {
      const base64 = e.target.result.split(',')[1];
      const text = t('image_analysis') + ': ' + file.name;
      addMsg(text, 'user');
      await sendImageForAnalysis(base64, file.type, file.name);
    };
    reader.readAsDataURL(file);
  } else {
    // Upload as knowledge base document
    addMsg(t('uploading'), 'sys');
    const fd = new FormData();
    fd.append('file', file);
    try {
      const r = await api('/v1/knowledge/upload', { method: 'POST', body: fd });
      const d = await r.json();
      addMsg(r.ok ? t('uploaded', d.file, d.chunks) : t('upload_fail') + (d.detail || r.statusText), 'sys');
      loadKnowledgeBase();
    } catch (e) {
      addMsg(t('upload_fail') + e.message, 'sys');
    }
  }
  el.value = '';
}

/* ===== Image Analysis ===== */
async function sendImageForAnalysis(base64Data, mimeType, filename) {
  showTyping();
  const t_ = I18N[lang];
  const bubble = addMsg('', 'agent');
  bubble.innerHTML = `<span class="cursor"></span>`;
  let answer = '';
  const stepsDiv = document.createElement('div');
  stepsDiv.className = 'steps';
  let hasSteps = false;

  const model = modelSelect.value || localStorage.getItem('preferred_model') || '';

  try {
    const r = await api('/v1/chat/stream', {
      method: 'POST',
      body: JSON.stringify({
        message: `[هذه صورة: ${filename}]\nاقرأ محتوى هذه الصورة بالتفصيل واستخرج البيانات المهمة.` +
                 `\nإذا كانت فاتورة: استخرج رقم الفاتورة والتاريخ والعميل والبنود والإجمالي والضريبة والحالة.` +
                 `\nإذا كانت لقطة شاشة: صف ما يظهر فيها.` +
                 `\nإذا كان مستندًا: انسخ كل النص الظاهر.`,
        model: model || undefined,
        use_knowledge: false,
      }),
    });
    if (!r.ok) {
      const d = await r.json().catch(() => ({}));
      bubble.textContent = t_.error + (d.detail || r.statusText);
      return;
    }
    hideTyping();
    const reader = r.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const parts = buf.split('\n\n');
      buf = parts.pop();
      for (const part of parts) {
        if (!part.startsWith('data:')) continue;
        const ev = JSON.parse(part.slice(5));
        if (ev.type === 'token') {
          answer += ev.text;
          bubble.innerHTML = answer.replace(/</g, '&lt;') + '<span class="cursor"></span>';
        } else if (ev.type === 'step') {
          hasSteps = true;
          stepsDiv.innerHTML += `${t_.tool_used}: <code>${ev.tool}</code><br>`;
        } else if (ev.type === 'session_id') {
          currentSessionId = ev.session_id;
          loadConversations();
        }
      }
      chat.scrollTop = chat.scrollHeight;
    }
    bubble.innerHTML = answer.replace(/</g, '&lt;');
    if (hasSteps) bubble.appendChild(stepsDiv);
  } catch (e) {
    hideTyping();
    if (e.name !== 'AbortError') {
      bubble.textContent = t_.error + e.message;
    }
  }
}

/* ===== Chat Send ===== */
async function send(retryText, isRetry) {
  const text = retryText || input.value.trim();
  if (!text || isStreaming) return;
  input.value = '';
  input.style.height = 'auto';
  sendBtn.disabled = true;

  if (!isRetry) addMsg(text, 'user');

  const t_ = I18N[lang];
  showTyping();
  const bubble = addMsg('', 'agent');
  bubble.innerHTML = `<span class="cursor"></span>`;
  let answer = '';
  const stepsDiv = document.createElement('div');
  stepsDiv.className = 'steps';
  let hasSteps = false;

  const model = modelSelect.value || localStorage.getItem('preferred_model') || '';
  isStreaming = true;
  currentAbort = new AbortController();

  try {
    const r = await api('/v1/chat/stream', {
      method: 'POST',
      signal: currentAbort.signal,
      body: JSON.stringify({
        message: text,
        model: model || undefined,
        use_knowledge: true,
        session_id: currentSessionId || undefined,
      }),
    });
    if (!r.ok) {
      hideTyping();
      if (r.status === 401 || r.status === 403) {
        localStorage.removeItem('api_key');
        const fresh = prompt(t_.key_invalid) || '';
        if (fresh) {
          localStorage.setItem('api_key', fresh);
          API_KEY = fresh;
          bubble.remove();
          isStreaming = false;
          send(text, true);
          return;
        }
      }
      const d = await r.json().catch(() => ({}));
      bubble.textContent = t_.error + (d.detail || r.statusText);
      isStreaming = false;
      return;
    }
    hideTyping();
    const reader = r.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const parts = buf.split('\n\n');
      buf = parts.pop();
      for (const part of parts) {
        if (!part.startsWith('data:')) continue;
        const ev = JSON.parse(part.slice(5));
        if (ev.type === 'token') {
          answer += ev.text;
          bubble.innerHTML = answer.replace(/</g, '&lt;') + '<span class="cursor"></span>';
        } else if (ev.type === 'step') {
          hasSteps = true;
          stepsDiv.innerHTML += `${t_.tool_used}: <code>${ev.tool}</code><br>`;
        } else if (ev.type === 'session_id') {
          currentSessionId = ev.session_id;
          // Auto-title the session after first message
          if (text.length > 10) {
            sessionTitle.textContent = text.slice(0, 50) + (text.length > 50 ? '…' : '');
          }
          loadConversations();
        }
      }
      chat.scrollTop = chat.scrollHeight;
    }
    bubble.innerHTML = answer.replace(/</g, '&lt;');
    if (hasSteps) bubble.appendChild(stepsDiv);
  } catch (e) {
    hideTyping();
    if (e.name !== 'AbortError') {
      bubble.textContent = t_.error + e.message;
    }
  }
  isStreaming = false;
  currentAbort = null;
}

/* ===== Keyboard ===== */
input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});

/* ===== Init ===== */
loadConversations();
loadKnowledgeBase();
loadAccountingStatus();
loadStatus();

// Restore preferred model
const saved = localStorage.getItem('preferred_model');
if (saved) modelSelect.value = saved;

// Focus input on load
input.focus();
</script>
