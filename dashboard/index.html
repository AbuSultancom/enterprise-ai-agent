<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enterprise AI Agent</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', Tahoma, system-ui, sans-serif; background: #0f172a; color: #e2e8f0; height: 100vh; display: flex; flex-direction: column; }
  header { padding: 12px 20px; background: #1e293b; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; gap: 10px; flex-wrap: wrap; }
  header h1 { font-size: 17px; font-weight: 600; }
  header h1 span { color: #38bdf8; }
  .header-actions { display: flex; gap: 8px; align-items: center; }
  #status { font-size: 11px; color: #94a3b8; width: 100%; }
  .btn-small { background: #334155; border: none; color: #e2e8f0; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 12px; }
  .btn-small:hover { background: #475569; }
  #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
  .msg { max-width: 78%; padding: 11px 15px; border-radius: 14px; line-height: 1.6; white-space: pre-wrap; font-size: 14px; }
  .user { align-self: flex-end; background: #2563eb; }
  .agent { align-self: flex-start; background: #1e293b; border: 1px solid #334155; }
  .sys { align-self: center; background: transparent; color: #64748b; font-size: 12px; padding: 4px; }
  .steps { margin-top: 8px; font-size: 12px; color: #94a3b8; border-top: 1px solid #334155; padding-top: 6px; }
  .steps code { color: #38bdf8; }
  .cursor { display: inline-block; width: 8px; height: 14px; background: #38bdf8; animation: blink 0.8s infinite; vertical-align: middle; }
  @keyframes blink { 50% { opacity: 0; } }
  #input-bar { display: flex; gap: 8px; padding: 14px 20px; background: #1e293b; border-top: 1px solid #334155; }
  #input { flex: 1; background: #0f172a; border: 1px solid #334155; border-radius: 10px; padding: 12px 14px; color: #e2e8f0; font-size: 14px; outline: none; font-family: inherit; }
  #input:focus { border-color: #38bdf8; }
  button.send { background: #2563eb; border: none; color: white; padding: 12px 20px; border-radius: 10px; cursor: pointer; font-size: 14px; }
  button.send:hover { background: #1d4ed8; }
  #file-input { display: none; }
</style>
</head>
<body>
<header>
  <h1>Enterprise <span>AI Agent</span></h1>
  <div class="header-actions">
    <button class="btn-small" id="upload-btn" onclick="document.getElementById('file-input').click()">📎</button>
    <button class="btn-small" id="lang-btn" onclick="toggleLang()">EN</button>
  </div>
  <div id="status">...</div>
</header>
<input type="file" id="file-input" accept=".txt,.md,.csv,.json,.pdf,.docx" onchange="uploadFile(this)">
<div id="chat"></div>
<div id="input-bar">
  <input id="input" autofocus>
  <button class="send" onclick="send()" id="send-btn"></button>
</div>
<script>
const I18N = {
  ar: {
    placeholder: 'اسأل الوكيل أي شيء...',
    send: 'إرسال',
    thinking: 'يفكر',
    tool_used: 'استخدم الأداة',
    uploading: 'جارٍ رفع الملف...',
    uploaded: (f, n) => `تم رفع "${f}" (${n} جزء) إلى قاعدة المعرفة ✓`,
    upload_fail: 'فشل رفع الملف: ',
    error: 'خطأ: ',
    key_prompt: 'أدخل مفتاح API:',
    dir: 'rtl', lang_btn: 'EN'
  },
  en: {
    placeholder: 'Ask the agent anything...',
    send: 'Send',
    thinking: 'Thinking',
    tool_used: 'Used tool',
    uploading: 'Uploading file...',
    uploaded: (f, n) => `Uploaded "${f}" (${n} chunk(s)) to the knowledge base ✓`,
    upload_fail: 'Upload failed: ',
    error: 'Error: ',
    key_prompt: 'Enter your API key:',
    dir: 'ltr', lang_btn: 'عربي'
  }
};
let lang = localStorage.getItem('lang') || 'ar';
let API_KEY = localStorage.getItem('api_key');
if (!API_KEY) {
  API_KEY = prompt(I18N[lang].key_prompt) || '';
  localStorage.setItem('api_key', API_KEY);
}
const chat = document.getElementById('chat');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send-btn');

function applyLang() {
  const t = I18N[lang];
  document.documentElement.lang = lang;
  document.documentElement.dir = t.dir;
  input.placeholder = t.placeholder;
  sendBtn.textContent = t.send;
  document.getElementById('lang-btn').textContent = t.lang_btn;
}
function toggleLang() {
  lang = lang === 'ar' ? 'en' : 'ar';
  localStorage.setItem('lang', lang);
  applyLang();
}
applyLang();

fetch('/health').then(r => r.json()).then(d => {
  document.getElementById('status').textContent =
    Object.entries(d.providers).map(([k,v]) => k + (v ? ' ✓' : ' ✗')).join('  ') +
    ` · tools: ${d.tools}` + (d.accounting_db ? ' · accounting ✓' : '');
}).catch(() => {});

function addMsg(text, cls) {
  const div = document.createElement('div');
  div.className = 'msg ' + cls;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

async function send() {
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  addMsg(text, 'user');
  const t = I18N[lang];
  const bubble = addMsg('', 'agent');
  bubble.innerHTML = `<span class="cursor"></span>`;
  let answer = '';
  const stepsDiv = document.createElement('div');
  stepsDiv.className = 'steps';
  let hasSteps = false;

  try {
    const r = await fetch('/v1/chat/stream', {
      method: 'POST',
      headers: {'Content-Type': 'application/json', 'X-API-Key': API_KEY},
      body: JSON.stringify({message: text})
    });
    if (!r.ok) {
      const d = await r.json().catch(() => ({}));
      bubble.textContent = t.error + (d.detail || r.statusText);
      return;
    }
    const reader = r.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';
    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      buf += decoder.decode(value, {stream: true});
      const parts = buf.split('\n\n');
      buf = parts.pop();
      for (const part of parts) {
        if (!part.startsWith('data:')) continue;
        const ev = JSON.parse(part.slice(5));
        if (ev.type === 'token') {
          answer += ev.text;
          bubble.innerHTML = answer.replace(/</g,'&lt;') + '<span class="cursor"></span>';
        } else if (ev.type === 'step') {
          hasSteps = true;
          stepsDiv.innerHTML += `${t.tool_used}: <code>${ev.tool}</code><br>`;
        } else if (ev.type === 'done') {
          bubble.innerHTML = answer.replace(/</g,'&lt;');
          if (hasSteps) bubble.appendChild(stepsDiv);
        }
      }
      chat.scrollTop = chat.scrollHeight;
    }
    bubble.innerHTML = answer.replace(/</g,'&lt;');
    if (hasSteps) bubble.appendChild(stepsDiv);
  } catch (e) {
    bubble.textContent = t.error + e.message;
  }
}
input.addEventListener('keydown', e => { if (e.key === 'Enter') send(); });

async function uploadFile(el) {
  const file = el.files[0];
  if (!file) return;
  const t = I18N[lang];
  addMsg(t.uploading, 'sys');
  const fd = new FormData();
  fd.append('file', file);
  try {
    const r = await fetch('/v1/knowledge/upload', {
      method: 'POST', headers: {'X-API-Key': API_KEY}, body: fd
    });
    const d = await r.json();
    addMsg(r.ok ? t.uploaded(d.file, d.chunks) : t.upload_fail + (d.detail || r.statusText), 'sys');
  } catch (e) {
    addMsg(t.upload_fail + e.message, 'sys');
  }
  el.value = '';
}
</script>
</body>
</html>
