<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enterprise AI Agent</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f172a; color: #e2e8f0; height: 100vh; display: flex; flex-direction: column; }
  header { padding: 14px 24px; background: #1e293b; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
  header h1 { font-size: 18px; font-weight: 600; }
  header h1 span { color: #38bdf8; }
  #status { font-size: 12px; color: #94a3b8; }
  #chat { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 14px; }
  .msg { max-width: 75%; padding: 12px 16px; border-radius: 14px; line-height: 1.55; white-space: pre-wrap; font-size: 14px; }
  .user { align-self: flex-end; background: #2563eb; }
  .agent { align-self: flex-start; background: #1e293b; border: 1px solid #334155; }
  .steps { margin-top: 8px; font-size: 12px; color: #94a3b8; border-top: 1px solid #334155; padding-top: 6px; }
  .steps code { color: #38bdf8; }
  #input-bar { display: flex; gap: 10px; padding: 16px 24px; background: #1e293b; border-top: 1px solid #334155; }
  #input { flex: 1; background: #0f172a; border: 1px solid #334155; border-radius: 10px; padding: 12px 14px; color: #e2e8f0; font-size: 14px; outline: none; }
  #input:focus { border-color: #38bdf8; }
  button { background: #2563eb; border: none; color: white; padding: 12px 22px; border-radius: 10px; cursor: pointer; font-size: 14px; }
  button:hover { background: #1d4ed8; }
</style>
</head>
<body>
<header>
  <h1>Enterprise <span>AI Agent</span></h1>
  <div id="status">connecting...</div>
</header>
<div id="chat"></div>
<div id="input-bar">
  <input id="input" placeholder="Ask the agent anything..." autofocus>
  <button onclick="send()">Send</button>
</div>
<script>
let API_KEY = localStorage.getItem('api_key');
if (!API_KEY) {
  API_KEY = prompt('Enter your API key (default dev key: dev-admin-key):') || 'dev-admin-key';
  localStorage.setItem('api_key', API_KEY);
}
const chat = document.getElementById('chat');
const input = document.getElementById('input');

fetch('/health').then(r => r.json()).then(d => {
  document.getElementById('status').textContent =
    `providers: ${Object.entries(d.providers).map(([k,v]) => k + (v ? ' ✓' : ' ✗')).join('  ')} · tools: ${d.tools}`;
});

function addMsg(text, cls, steps) {
  const div = document.createElement('div');
  div.className = 'msg ' + cls;
  div.textContent = text;
  if (steps && steps.length) {
    const s = document.createElement('div');
    s.className = 'steps';
    s.innerHTML = steps.map(st => `<code>${st.tool}</code>(${JSON.stringify(st.arguments)})`).join('<br>');
    div.appendChild(s);
  }
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function send() {
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  addMsg(text, 'user');
  const thinking = document.createElement('div');
  thinking.className = 'msg agent';
  thinking.textContent = 'Thinking...';
  chat.appendChild(thinking);
  try {
    const r = await fetch('/v1/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json', 'X-API-Key': API_KEY},
      body: JSON.stringify({message: text})
    });
    const d = await r.json();
    thinking.remove();
    if (r.ok) addMsg(d.answer, 'agent', d.steps);
    else addMsg('Error: ' + (d.detail || r.statusText), 'agent');
  } catch (e) {
    thinking.remove();
    addMsg('Network error: ' + e.message, 'agent');
  }
}
input.addEventListener('keydown', e => { if (e.key === 'Enter') send(); });
</script>
</body>
</html>
