services:
  agent:
    build: ..
    ports:
      - "8000:8000"
    environment:
      # Format: role:key,role:key  (roles: admin, user)
      API_KEYS: "admin:${ADMIN_KEY:-dev-admin-key},user:${USER_KEY:-dev-user-key}"
      DEFAULT_MODEL: "ollama:qwen2.5:7b"
      OLLAMA_BASE_URL: "http://ollama:11434"
      # Uncomment for cloud providers:
      # OPENAI_BASE_URL: "https://api.deepseek.com/v1"
      # OPENAI_API_KEY: "${OPENAI_API_KEY}"
      # Accounting ERP (Onyx Pro / SQL Server), optional:
      # ACCOUNTING_DB_URL: "${ACCOUNTING_DB_URL}"
    volumes:
      - agent-data:/data
    depends_on:
      - ollama
    restart: unless-stopped

  whatsapp:
    build: ../whatsapp
    ports:
      - "3001:3001"   # QR scan page: http://localhost:3001
    environment:
      AGENT_URL: "http://agent:8000"
      AGENT_API_KEY: "${ADMIN_KEY:-dev-admin-key}"
      # BOT_PREFIX: "!ai "        # only reply to messages starting with this
      # IGNORE_GROUPS: "true"     # ignore group chats (default true)
    volumes:
      - whatsapp-session:/data
    depends_on:
      - agent
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    restart: unless-stopped

volumes:
  agent-data:
  ollama-models:
  whatsapp-session:
